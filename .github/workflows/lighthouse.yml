name: Lighthouse CI

on:
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Esperar a que Vercel despliegue
        run: sleep 90

      - name: Ejecutar Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://antoniomonereo.com
            https://antoniomonereo.com/pinturas
            https://antoniomonereo.com/obra/muerte-en-tarifa
          uploadArtifacts: true
          temporaryPublicStorage: true
